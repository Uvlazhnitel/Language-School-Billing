name: Publish release

on:
  push:
    tags:
      - "v*"
      - "ru-v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release for ${{ github.ref_name }} already exists."
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "LangSchool ${{ github.ref_name }}" \
              --generate-notes
          fi

  windows-release:
    name: Build Windows installer
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          'C:\Program Files (x86)\NSIS' | Out-File -FilePath $env:GITHUB_PATH -Append
          & 'C:\Program Files (x86)\NSIS\makensis.exe' /VERSION

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test Go packages
        shell: pwsh
        env:
          CGO_ENABLED: "0"
        run: |
          $packages = go list ./... | Where-Object { $_ -notlike 'langschool/frontend/node_modules/*' }
          go test $packages

      - name: Build Windows installer
        shell: pwsh
        env:
          CGO_ENABLED: "0"
        run: |
          wails build -clean -nsis -webview2 download
          $installer = Get-ChildItem build\bin -Filter '*installer.exe' -ErrorAction Stop | Select-Object -First 1
          if (-not $installer) {
            throw 'Windows installer was not created.'
          }

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $flavor = if ($tag.StartsWith('ru-v')) { 'ru' } else { 'en' }
          $installer = Get-ChildItem build\bin -Filter '*installer.exe' -ErrorAction Stop | Select-Object -First 1
          $assetName = "langschool-$flavor-windows-installer-$tag.exe"
          Copy-Item $installer.FullName "build\bin\$assetName" -Force
          "asset_path=build\bin\$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload asset to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.asset.outputs.asset_path }}" --repo "${{ github.repository }}" --clobber

  macos-release:
    name: Build macOS app
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test Go packages
        run: go test ./...

      - name: Build macOS app bundle
        run: wails build -clean

      - name: Prepare release asset
        id: asset
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" == ru-v* ]]; then
            flavor="ru"
          else
            flavor="en"
          fi
          asset_name="langschool-${flavor}-macos-${tag}.zip"
          ditto -c -k --sequesterRsrc --keepParent "build/bin/langschool.app" "build/bin/${asset_name}"
          echo "asset_path=build/bin/${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.asset.outputs.asset_path }}" --repo "${{ github.repository }}" --clobber
