name: Windows release checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  windows-release:
    name: Build and test Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          'C:\Program Files (x86)\NSIS' | Out-File -FilePath $env:GITHUB_PATH -Append
          & 'C:\Program Files (x86)\NSIS\makensis.exe' /VERSION

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test Go packages
        shell: pwsh
        env:
          CGO_ENABLED: '0'
        run: |
          $packages = go list ./... | Where-Object { $_ -notlike 'langschool/frontend/node_modules/*' }
          go test $packages

      - name: Build Windows installer
        shell: pwsh
        env:
          CGO_ENABLED: '0'
        run: |
          wails build -clean -nsis -webview2 download
          $installer = Get-ChildItem build\bin -Filter '*installer.exe' -ErrorAction SilentlyContinue
          if (-not $installer) {
            throw 'Windows installer was not created.'
          }
